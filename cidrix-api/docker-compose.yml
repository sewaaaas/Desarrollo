services:
  postgres:
    image: postgres:16-alpine
    container_name: cidrix_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cidrix_user
      POSTGRES_PASSWORD: cidrix_pass
      POSTGRES_DB: cidrix_db
    ports:
      - "5432:5432"
    volumes:
      - cidrix_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cidrix_user -d cidrix_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cidrix_postgres_data:
    driver: local